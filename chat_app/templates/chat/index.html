<!DOCTYPE html>
<html>
<head>
    <title>Mon Chat Distribué</title>
    <style>
        #chat-log { width: 100%; height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
        #chat-message-input { width: 80%; }
    </style>
</head>
<body>
    <h2>💬 Chat Mariem (Mongo + Redis)</h2>
    <div id="chat-log"></div>
    <input id="chat-message-input" type="text" placeholder="Tape ton message...">
    <button id="chat-message-submit">Envoyer</button>

    <script>
        // Connexion au WebSocket (le tunnel en temps réel)
        const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/');

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            document.querySelector('#chat-log').innerHTML += (
                '<b>' + data.sender + ':</b> ' + data.text + '<br>'
            );
        };

        document.querySelector('#chat-message-submit').onclick = function(e) {
            const messageInputDom = document.querySelector('#chat-message-input');
            const message = messageInputDom.value;
            // On envoie le message au serveur
            chatSocket.send(JSON.stringify({
                'message': message,
                'sender': 'Mariem' // On pourra changer avec l'utilisateur connecté plus tard
            }));
            messageInputDom.value = '';
        };
    </script>
</body>
</html>
